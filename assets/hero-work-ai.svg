<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#343ced;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#d8fd49;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="hero-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#f3f4ff"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="400" height="280" rx="16" fill="url(#hero-bg)"/>
  <g filter="url(#soft-shadow)">
    <rect x="40" y="40" width="320" height="200" rx="12" fill="url(#hero-card)" stroke="rgba(52,60,237,0.12)" stroke-width="1"/>
    <!-- Abstract nodes (AI / connection) -->
    <circle cx="120" cy="100" r="24" fill="#343ced" opacity="0.9"/>
    <circle cx="200" cy="90" r="20" fill="#6366f1" opacity="0.85"/>
    <circle cx="280" cy="100" r="24" fill="#343ced" opacity="0.9"/>
    <circle cx="160" cy="170" r="18" fill="#d8fd49" opacity="0.7"/>
    <circle cx="240" cy="170" r="18" fill="#a5b4fc" opacity="0.8"/>
    <!-- Connection lines -->
    <path d="M120 100 L180 85 L200 90 L260 98 L280 100" stroke="#343ced" stroke-width="2" stroke-opacity="0.3" fill="none" stroke-linecap="round"/>
    <path d="M144 118 L152 155 L160 170" stroke="#343ced" stroke-width="1.5" stroke-opacity="0.25" fill="none" stroke-linecap="round"/>
    <path d="M256 118 L248 155 L240 170" stroke="#343ced" stroke-width="1.5" stroke-opacity="0.25" fill="none" stroke-linecap="round"/>
    <!-- Work AI suggestion -->
    <rect x="140" y="195" width="120" height="28" rx="6" fill="#343ced" opacity="0.15"/>
    <rect x="150" y="202" width="60" height="6" rx="2" fill="#343ced" opacity="0.4"/>
    <rect x="220" y="202" width="30" height="6" rx="2" fill="#d8fd49" opacity="0.6"/>
  </g>
</svg>
